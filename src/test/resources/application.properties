# Inherits from src/main/resources/application.properties and overrides
# anything we don't want during test runs.

# Don't write a logs/api.log on disk during test runs — console only.
logging.file.name=

# Tighten test logging a touch so output stays readable. Override per test
# with @TestPropertySource if you need DEBUG.
logging.level.zac.demo.api=INFO
logging.level.org.springframework=WARN
logging.level.org.springdoc=WARN
