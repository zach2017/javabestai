# HTTP Basic authentication is enforced for /api/** by SecurityBasicConfig.
# A single static user is registered in an InMemoryUserDetailsManager.
#
# In production these would come from environment variables, a secrets
# manager, or a real UserDetailsService backed by a database/LDAP.

app.security.user.name=admin
app.security.user.password=changeme
app.security.user.roles=USER
