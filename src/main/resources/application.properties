spring.application.name=api

# =========================================================================
# Active profile
# =========================================================================
# Available profiles:
#   security-off    — no Spring Security applied (SecurityAutoConfiguration excluded)
#   security-basic  — HTTP Basic auth with a static user
#
# Override with -Dspring.profiles.active=security-basic at runtime.
spring.profiles.active=security-off

# =========================================================================
# File logging (Spring Boot / Logback)
# =========================================================================
# Where the rolling log file lives. Parent dirs are created automatically.
logging.file.name=logs/api.log

# Pattern used for the file log lines. Console pattern is left at default.
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Rolling policy — Logback rolls api.log -> api-YYYY-MM-DD.0.log etc.
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=7
logging.logback.rollingpolicy.total-size-cap=200MB

# Per-package log levels. Bump these to DEBUG to see more detail.
logging.level.root=INFO
logging.level.zac.demo.api=INFO
# To silence the audit aspect entirely without disabling AOP wiring:
# logging.level.zac.demo.api.audit=WARN

# =========================================================================
# Audit aspect — runtime behaviour controls
# =========================================================================
# Master on/off switch. When false, the @Around proceeds without recording.
audit.enabled=true

# Whether arguments / return values / timing are captured into the event.
# Turn off log-args for endpoints that receive sensitive payloads.
audit.log-args=true
audit.log-result=true
audit.log-timing=true

# Maximum length of any single arg or result string. Longer values are
# truncated and tagged with the number of characters dropped.
audit.max-value-length=200

# When false, calls into springdoc/swagger controllers are NOT audited
# (the pointcut still matches; the aspect short-circuits).
audit.include-swagger=true

# =========================================================================
# Audit sinks — which implementations of AuditSink are wired in
# =========================================================================
# Default file/console sink. Disable to mute file output entirely.
audit.sinks.file.enabled=true

# Future sinks — toggle on once the corresponding @Component exists.
# audit.sinks.database.enabled=false
# audit.sinks.elasticsearch.enabled=false


app.security.user.name=admin
app.security.user.password=changeme
app.security.user.roles=USER
