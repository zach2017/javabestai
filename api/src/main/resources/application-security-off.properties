# =========================================================================
# Profile: security-off
# =========================================================================
# Spring Boot's security auto-configuration is excluded so no security
# filter chain is created. All endpoints are public, no login required.
#
# Listed here (and not via @SpringBootApplication exclude=...) so that the
# exclusion only takes effect when this profile is active.

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration,\
  org.springframework.boot.autoconfigure.security.servlet.SecurityFilterAutoConfiguration
